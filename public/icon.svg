<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A962"/>
      <stop offset="100%" stop-color="#E5C77D"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#04060A"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="180" height="180" rx="38"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="1" y="1" width="178" height="178" rx="37" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- Bold "P" letterform -->
  <g clip-path="url(#clip)">
    <!-- Vertical stem -->
    <rect x="44" y="36" width="26" height="108" rx="6" fill="url(#gold)"/>

    <!-- Top bowl - outer -->
    <path d="M70 36 H112 C130 36 144 50 144 68 C144 86 130 100 112 100 H70 V36Z"
          fill="url(#gold)"/>

    <!-- Top bowl - inner cutout -->
    <path d="M70 58 H108 C118 58 124 62 124 68 C124 74 118 78 108 78 H70 V58Z"
          fill="url(#bg)"/>
  </g>
</svg>
